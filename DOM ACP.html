<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    img {
        opacity: 0
    }
</style>

<body class="d-flex flex-column justify-content-center align-items-center p-3 gap-3">
    <div class="s-flex flex-row">
        <img height="100" width="100" id="image1" src="Sun.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image2" src="mercury.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image3" src="Venus.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image4" src="Earth.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image5" src="mars.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image6" src="jupiter.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image7" src="saturn.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image8" src="uranus.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image9" src="neptune.jfif" alt="" class="rounded-5">
        <img height="100" width="100" id="image10" src="pluto.jfif" alt="" class="rounded-5">
    </div>

    <p class="fs1" id="info container"></p>
    <h1>What do you want to know about Solar System?</h1>
    <div>
        <button type="button" class="btn btn-primary p-3" onclick="sun_info()">Sun</button>
        <button type="button" class="btn btn-primary p-3" onclick="mercury_info()">Mercury</button>
        <button type="button" class="btn btn-primary p-3" onclick="venus_info()">Venus</button>
        <button type="button" class="btn btn-primary p-3" onclick="earth_info()">Earth</button>
        <button type="button" class="btn btn-primary p-3" onclick="mars_info()">Mars</button>
        <button type="button" class="btn btn-primary p-3" onclick="jupiter_info()">Jupiter</button>
        <button type="button" class="btn btn-primary p-3" onclick="saturn_info()">Saturn</button>
        <button type="button" class="btn btn-primary p-3" onclick="uranus_info()">Uranus</button>
        <button type="button" class="btn btn-primary p-3" onclick="neptune_info()">Neptune</button>
        <button type="button" class="btn btn-primary p-3" onclick="pluto_info()">Pluto</button>
    </div>

    <script>
        function sun_info() {
            document.getElementById("info container").textContent = "The Sun is a 4.6-billion-year-old yellow dwarf star positioned at the center of our solar system, holding 99.8% of its total mass. Located about 93 million miles from Earth, its gravity keeps our planet in orbit, while its intense light and heat—generated by nuclear fusion at its 27-million-degree core—power life on Earth. Roughly 109 times wider than Earth, this massive ball of hot plasma features a visible surface called the photosphere and an outer atmosphere known as the corona, serving as the ultimate engine for our weather, climate, and survival."
            document.getElementById("image1").style.opacity = "1"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"

        }
        function mercury_info() {
            document.getElementById("info container").textContent = "Mercury is the smallest and closest planet to the Sun, orbiting it every 88 Earth days. It is a bleak, rocky world covered in craters, much like our Moon. Because it lacks a substantial atmosphere to trap heat, Mercury experiences the most extreme temperature swings in the solar system—scorching at 800°F (430°C) during the day and freezing to -290°F (-180°C) at night. Despite its small size, it is incredibly dense, featuring a massive iron core that makes up most of its interior."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "1"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }

        function venus_info() {
            document.getElementById("info container").textContent = "Venus is Earth’s closest planetary neighbor and similarly sized, but it is a hellish world. A runaway greenhouse effect caused by its thick, toxic atmosphere makes Venus the hottest planet in our solar system, with a constant surface temperature of 900°F (475°C)—hot enough to melt lead. It is a volcanic landscape with a crushing atmospheric pressure, and it rotates so slowly and backward that its day is actually longer than its year."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "1"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function earth_info() {
            document.getElementById("info container").textContent = "Earth is the third planet from the Sun and the only known world in the universe capable of harboring life. Unlike its harsh neighbors, Earth features a breathable atmosphere rich in nitrogen and oxygen, and its surface is uniquely covered by 71% liquid water oceans. It sits in the Sun's Goldilocks zone—where temperatures are just right for water to remain liquid rather than freezing or boiling away—and possesses a strong magnetic field that shields us from harmful solar radiation."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "1"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function mars_info() {
            document.getElementById("info container").textContent = "Mars is the fourth planet from the Sun and a dusty, cold, desert world with a very thin atmosphere. Known as the Red Planet due to iron minerals in its soil rusting, Mars features dramatic landscapes including the largest volcano in the solar system (Olympus Mons) and a canyon system that could stretch across the entire United States. There is strong evidence that Mars was much wetter and warmer billions of years ago, making it a primary target for scientists searching for signs of ancient microscopic life."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "1"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function jupiter_info() {
            document.getElementById("info container").textContent = "Jupiter is the fifth planet from the Sun and the largest in our solar system, packing more than twice the mass of all the other planets combined. It is a massive gas giant primarily composed of hydrogen and helium, lacking a solid surface you could stand on.Jupiter is famous for its colorful, swirling bands of clouds driven by powerful winds, as well as the Great Red Spot—a gigantic, centuries - old storm larger than Earth.It also rules over a mini - solar system of its own, boasting a powerful magnetic field and dozens of moons, including Ganymede, the largest moon in the solar system."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "1"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function saturn_info() {
            document.getElementById("info container").textContent = "Saturn is the sixth planet from the Sun and the second-largest in our solar system. A massive gas giant made mostly of hydrogen and helium, it is most famous for its spectacular, complex ring system composed of billions of chunks of ice and rock. Saturn is incredibly light for its size; it has the lowest density of all the planets and could theoretically float in a giant bathtub. It also boasts a vast family of moons, including Titan, which is larger than the planet Mercury and has its own thick atmosphere."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "1"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function uranus_info() {
            document.getElementById("info container").textContent = "Uranus is the seventh planet from the Sun and the third-largest in our solar system. It is classified as an ice giant because most of its mass is a hot, dense fluid of icy materials—water, ammonia, and methane—above a small, rocky core. What makes Uranus truly unique is that it rotates completely on its side, rolling around the Sun like a bowling ball, likely due to a colossal collision billions of years ago. Methane gas in its atmosphere gives Uranus its distinct, pale blue-green color, and it possesses a faint system of narrow rings alongside dozens of small moons."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "1"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "0"
        }
        function neptune_info() {
            document.getElementById("info container").textContent = "Neptune is the eighth and farthest known planet from the Sun in our solar system. Like Uranus, it is an ice giant, composed mainly of a slushy mix of water, ammonia, and methane over a solid, rocky core. Methane in its upper atmosphere gives Neptune a brilliant, deep-blue color. It is an incredibly wild and windy world, experiencing supersonic winds that can reach up to 1,200 miles per hour (2,000 kilometers per hour)—the fastest recorded in the solar system. Because it is so far away, Neptune takes a staggering 165 Earth days to complete just one orbit around the Sun."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "1"
            document.getElementById("image10").style.opacity = "0"
        }
        function pluto_info() {
            document.getElementById("info container").textContent = "Pluto is a complex and icy dwarf planet located in the Kuiper Belt, a region of icy bodies beyond the orbit of Neptune. Once considered the ninth planet of our solar system, it was reclassified as a dwarf planet in 2006 because it hasn't cleared its neighboring region of other objects. It features a surprisingly diverse landscape of rugged mountains made of water ice, vast plains of frozen nitrogen, and a famous heart-shaped glacier. Pluto is incredibly cold, with temperatures averaging around -387°F (-232°C), and it has five known moons, the largest of which is Charon."
            document.getElementById("image1").style.opacity = "0"
            document.getElementById("image2").style.opacity = "0"
            document.getElementById("image3").style.opacity = "0"
            document.getElementById("image4").style.opacity = "0"
            document.getElementById("image5").style.opacity = "0"
            document.getElementById("image6").style.opacity = "0"
            document.getElementById("image7").style.opacity = "0"
            document.getElementById("image8").style.opacity = "0"
            document.getElementById("image9").style.opacity = "0"
            document.getElementById("image10").style.opacity = "1"
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
